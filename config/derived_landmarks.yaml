version: 1

# Landmark name aliases: map canonical names used in this config
# to actual names in the dataset. Override when switching datasets.
# If a name is not listed here, it is used as-is.
landmark_name_map:
  NeckLeft: "Mid Neck Left"
  NeckRight: "Mid Neck Right"
  NeckFront: NeckFront
  NeckBack: NeckBack

landmarks:

  NeckFrontLeft:
    triangle: [NeckFront, NeckLeft, NeckBack]
    weights: null
    init_method: plane_intersection
    init_params:
      coronal_landmark: NeckFront
      sagittal_landmark: NeckLeft
    family: Neck

  NeckFrontRight:
    triangle: [NeckFront, NeckRight, NeckBack]
    weights: null
    init_method: plane_intersection
    init_params:
      coronal_landmark: NeckFront
      sagittal_landmark: NeckRight
    family: Neck

  NeckBackLeft:
    triangle: [NeckBack, NeckLeft, NeckFront]
    weights: null
    init_method: plane_intersection
    init_params:
      coronal_landmark: NeckBack
      sagittal_landmark: NeckLeft
    family: Neck

  NeckBackRight:
    triangle: [NeckBack, NeckRight, NeckFront]
    weights: null
    init_method: plane_intersection
    init_params:
      coronal_landmark: NeckBack
      sagittal_landmark: NeckRight
    family: Neck

  ArmholeDepthFrontLeft:
    triangle: [ShoulderLeft, ArmpitLeft, NeckLeft]
    weights: null
    init_method: contour_z_extremum
    init_params:
      extremum: max
      plane_landmarks: [ShoulderLeft, ArmpitLeft]
    family: Armhole

  ArmholeDepthBackLeft:
    triangle: [ShoulderLeft, ArmpitLeft, NeckBack]
    weights: null
    init_method: contour_z_extremum
    init_params:
      extremum: min
      plane_landmarks: [ShoulderLeft, ArmpitLeft]
    family: Armhole

  ArmholeDepthFrontRight:
    triangle: [ShoulderRight, ArmpitRight, NeckRight]
    weights: null
    init_method: contour_z_extremum
    init_params:
      extremum: max
      plane_landmarks: [ShoulderRight, ArmpitRight]
    family: Armhole

  ArmholeDepthBackRight:
    triangle: [ShoulderRight, ArmpitRight, NeckBack]
    weights: null
    init_method: contour_z_extremum
    init_params:
      extremum: min
      plane_landmarks: [ShoulderRight, ArmpitRight]
    family: Armhole

measurements:

  MidShoulderToApexLeft:
    type: geodesic
    from: "Mid Shoulder Left"
    to: ApexBustLeft
    family: Shoulder
    also_output_y_projection: true

  MidShoulderToApexRight:
    type: geodesic
    from: "Mid Shoulder Right"
    to: ApexBustRight
    family: Shoulder
    also_output_y_projection: true

  ApexToLowerBustLeft:
    type: geodesic
    from: ApexBustLeft
    to: LowerBustLeft
    family: Shoulder
    also_output_y_projection: true

  ApexToLowerBustRight:
    type: geodesic
    from: ApexBustRight
    to: LowerBustRight
    family: Shoulder
    also_output_y_projection: true
